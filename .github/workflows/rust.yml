name: Rust

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - ".ai/**"
      - ".codex/**"
      - ".idea/**"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Project Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
